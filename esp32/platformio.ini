; platformio.ini — ergissvag_can ESP32 J533 CAN tap + sensors
; @author Gabriel Diaconu (ERGISS Media)
; @version 1.1
; @changes
;   v1.0 2026-04-22 — creat initial (ESP32 DevKit v1 + SN65HVD230 listen-only)
;   v1.1 2026-05-23 — adaugat lib_deps pt BMP280 + GY-85 (ADXL345 + HMC5883L; ITG3200 raw I2C)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Flags compile:
;   CAN_BITRATE: 500000 (Antrieb) sau 100000 (Komfort)
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17

lib_deps =
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit ADXL345@^1.3.4
    adafruit/Adafruit HMC5883 Unified@^1.2.3
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; ITG3200 gyroscope — citit raw I2C in sensors.cpp (nu necesita librarie)

; Partitionare default (4MB flash)
board_build.partitions = default.csv
